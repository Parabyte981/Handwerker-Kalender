<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Handwerker Kalender Pro</title>

    <!-- 1. Tailwind CSS für das Styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- 2. Google Fonts für moderne Schriftart -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <style>
      body { font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
      .toast-enter-active { opacity: 1; transform: translateY(0); transition: all 300ms; }
      .toast-exit-active { opacity: 0; transform: translateY(20px); transition: all 300ms; }
      @media print {
        body * { visibility: hidden; }
        #printable-invoice, #printable-invoice * { visibility: visible; }
        #printable-invoice { position: absolute; left: 0; top: 0; width: 100%; }
        .no-print { display: none !important; }
      }
    </style>

    <!-- 3. JavaScript Bibliotheken -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/lucide-react@0.378.0/dist/lucide-react.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel" data-presets="react">
        // --- GLOBALE VARIABLEN & KONSTANTEN ---
        const { useState, useEffect, useMemo, Fragment } = React;
        const { createRoot } = ReactDOM;
        const { Home, Calendar, Users, FileText, Package, Settings, Wrench, Plus, Edit3, Trash2, X, Search, ChevronLeft, ChevronRight, MapPin, Phone, User, Building, Clock, Flame, Save, Printer } = lucide_react;
        const APP_STORAGE_KEY = 'handwerkerProDataV2';

        // --- INITIALDATEN ---
        const initialData = {
          customers: [
            { id: 1, name: 'Familie Müller', address: 'Hauptstraße 12, 10115 Berlin', phone: '030/123456', email: 'mueller@email.de', notes: 'Bevorzugt Termine am Vormittag.', tags: ['Privatkunde', 'Wartungsvertrag'] },
            { id: 2, name: 'Schmidt GmbH', firma: 'Schmidt GmbH', address: 'Industriestr. 5, 12459 Berlin', phone: '030/789012', email: 'kontakt@schmidt-gmbh.de', notes: 'Rechnungen an buchhaltung@schmidt-gmbh.de', tags: ['Geschäftskunde'] }
          ],
          appointments: [
            { id: 1, title: 'Heizung Wartung', date: '2025-05-31', time: '09:00', duration: 120, customerId: 1, status: 'abgeschlossen', category: 'wartung', priority: 'normal', notes: 'Anlage geprüft, alles in Ordnung.', materials: [{name: 'Filter', quantity: 1}], hours: 1.5, photos: [] },
            { id: 2, title: 'Badezimmer Renovierung', date: new Date(new Date().setDate(new Date().getDate() + 1)).toISOString().split('T')[0], time: '08:00', duration: 480, customerId: 2, status: 'in_arbeit', category: 'renovierung', priority: 'hoch', notes: 'Fliesen sind verlegt, Sanitärinstallation folgt.', materials: [{name: 'Fliesen 60x60cm', quantity: 20}, {name: 'Fugenmörtel', quantity: 1}], hours: 24, photos: [] }
          ],
          materials: [
            { id: 1, name: 'Arbeitsstunde', unit: 'Std.', price: 65.00 },
            { id: 2, name: 'Anfahrtspauschale', unit: 'Pauschale', price: 40.00 },
            { id: 3, name: 'Heizungsfilter Typ A', unit: 'Stück', price: 25.50 }
          ],
          invoices: [
             { id: 1, invoiceNumber: '2025-001', customerId: 1, issueDate: '2025-06-01', dueDate: '2025-06-15', items: [{id: 1, description: 'Heizung Wartung', quantity: 1.5, unit: 'Std.', unitPrice: 65, total: 97.5}], subtotal: 97.5, taxRate: 19, taxAmount: 18.53, total: 116.03, status: 'Bezahlt', notes: 'Vielen Dank für Ihren Auftrag.' }
          ],
          settings: {
              companyName: 'Ihr Handwerksbetrieb', companyAddress: 'Musterstraße 1, 12345 Musterstadt', companyPhone: '0123/456789', companyEmail: 'info@ihrbetrieb.de', taxId: 'DE123456789', bankDetails: 'IBAN: DE00 1234 5678 9012 3456 78, BIC: BANKDEFFXXX'
          }
        };

        // --- HAUPTKOMPONENTE ---
        const HandwerkerKalenderPro = () => {
            // --- STATE MANAGEMENT ---
            const [data, setData] = useState(() => {
                try {
                    const savedData = localStorage.getItem(APP_STORAGE_KEY);
                    if (savedData) {
                        return JSON.parse(savedData);
                    }
                    localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(initialData));
                    return initialData;
                } catch (error) {
                    console.error("Fehler beim Laden der Daten:", error);
                    return initialData;
                }
            });
            const [view, setView] = useState('dashboard');
            const [currentDate, setCurrentDate] = useState(new Date());

            // --- PERSISTENZ ---
            useEffect(() => {
                try {
                    localStorage.setItem(APP_STORAGE_KEY, JSON.stringify(data));
                } catch (error) {
                    console.error("Fehler beim Speichern der Daten:", error);
                }
            }, [data]);

            // --- BEISPIEL-VIEW: Dashboard ---
            const DashboardView = ({ data }) => {
                const upcomingAppointments = data.appointments
                    .filter(a => new Date(a.date) >= new Date(new Date().setHours(0,0,0,0)))
                    .sort((a,b) => new Date(a.date) - new Date(b.date))
                    .slice(0, 3);

                const totalRevenueMonth = data.invoices
                    .filter(inv => inv.status === 'Bezahlt' && new Date(inv.issueDate).getMonth() === new Date().getMonth())
                    .reduce((sum, inv) => sum + inv.total, 0);

                return (
                    <div>
                        <h1 className="text-3xl font-bold mb-6">Dashboard</h1>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div className="bg-white p-6 rounded-lg shadow">
                                <h2 className="text-lg font-semibold text-gray-600">Umsatz (Akt. Monat)</h2>
                                <p className="text-3xl font-bold">€ {totalRevenueMonth.toFixed(2)}</p>
                            </div>
                            <div className="bg-white p-6 rounded-lg shadow">
                                <h2 className="text-lg font-semibold text-gray-600">Termine diese Woche</h2>
                                <p className="text-3xl font-bold">{data.appointments.length}</p> {/* Vereinfachte Logik */}
                            </div>
                            <div className="bg-white p-6 rounded-lg shadow">
                                <h2 className="text-lg font-semibold text-gray-600">Offene Rechnungen</h2>
                                <p className="text-3xl font-bold">{data.invoices.filter(i => i.status === 'Gesendet' || i.status === 'Überfällig').length}</p>
                            </div>
                        </div>
                        <div className="mt-8 bg-white p-6 rounded-lg shadow">
                            <h2 className="text-xl font-bold mb-4">Nächste Termine</h2>
                            <div className="space-y-3">
                                {upcomingAppointments.length > 0 ? upcomingAppointments.map(apt => {
                                    const customer = data.customers.find(c => c.id === apt.customerId);
                                    return (
                                        <div key={apt.id} className="flex justify-between items-center p-3 bg-gray-50 rounded-md">
                                            <div>
                                                <p className="font-semibold">{apt.title} <span className="text-gray-500">bei {customer ? customer.name : 'Unbekannt'}</span></p>
                                                <p className="text-sm text-gray-600">{new Date(apt.date).toLocaleDateString('de-DE')} um {apt.time}</p>
                                            </div>
                                            <button className="text-blue-600 hover:underline">Details</button>
                                        </div>
                                    );
                                }) : <p className="text-gray-500">Keine anstehenden Termine.</p>}
                            </div>
                        </div>
                    </div>
                );
            };

            // --- RENDER-LOGIK ---
            const renderView = () => {
                // In einer echten, vollständigen App würden hier alle Views aufgerufen.
                // Wir zeigen hier nur das Dashboard als funktionierendes Beispiel.
                switch(view) {
                    case 'dashboard': return <DashboardView data={data} />;
                    case 'calendar': return <div className="text-center p-8 bg-white rounded-lg shadow">Kalenderansicht hier implementieren</div>;
                    case 'customers': return <div className="text-center p-8 bg-white rounded-lg shadow">Kundenansicht hier implementieren</div>;
                    case 'invoices': return <div className="text-center p-8 bg-white rounded-lg shadow">Rechnungsansicht hier implementieren</div>;
                    case 'materials': return <div className="text-center p-8 bg-white rounded-lg shadow">Materialverwaltung hier implementieren</div>;
                    case 'settings': return <div className="text-center p-8 bg-white rounded-lg shadow">Einstellungen hier implementieren</div>;
                    default: return <DashboardView data={data} />;
                }
            };

            return (
                <div className="h-screen w-screen flex bg-gray-100 overflow-hidden">
                    {/* Sidebar Navigation */}
                    <nav className="w-64 bg-white shadow-md flex-shrink-0 flex flex-col p-4">
                        <div className="flex items-center gap-2 mb-8">
                             <Wrench className="text-blue-600" size={28}/>
                             <h1 className="text-xl font-bold">Handwerker Pro</h1>
                        </div>
                        <ul className="space-y-2">
                           {[{icon: Home, label: 'Dashboard', view: 'dashboard'}, {icon: Calendar, label: 'Kalender', view: 'calendar'}, {icon: Users, label: 'Kunden', view: 'customers'}, {icon: FileText, label: 'Rechnungen', view: 'invoices'}, {icon: Package, label: 'Material', view: 'materials'}, {icon: Settings, label: 'Einstellungen', view: 'settings'}].map(item => (
                                <li key={item.view}>
                                    <button onClick={() => setView(item.view)} className={`w-full flex items-center gap-3 px-4 py-2 rounded-md text-left transition-colors ${view === item.view ? 'bg-blue-100 text-blue-700 font-semibold' : 'text-gray-600 hover:bg-gray-100'}`}>
                                        <item.icon size={20}/>
                                        <span>{item.label}</span>
                                    </button>
                                </li>
                           ))}
                        </ul>
                    </nav>

                    {/* Main Content Area */}
                    <main className="flex-1 p-6 lg:p-8 overflow-y-auto">
                        {renderView()}
                    </main>
                </div>
            );
        }

        // --- ANWENDUNG STARTEN ---
        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<HandwerkerKalenderPro />);

    </script>
</body>
</html>
